<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>

<style>
body{
margin:0;
font-family:Segoe UI;
display:flex;
height:100vh;
background:#343541;
color:white;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#202123;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{
margin:5px 0;
padding:12px;
border:none;
background:#3e3f4b;
color:white;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:#565869;
}

/* MAIN CHAT AREA */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.top{
background:#444654;
padding:15px;
text-align:right;
}

/* CHAT AREA */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

/* MESSAGE BUBBLES */
.msg{
margin:15px 0;
max-width:70%;
padding:15px;
border-radius:12px;
line-height:1.4;
}

.user{
background:#0084ff;
margin-left:auto;
}

.bot{
background:#444654;
margin-right:auto;
}

/* INPUT BAR */
.input-area{
display:flex;
padding:15px;
background:#40414f;
}

.input-area input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

.input-area button{
margin-left:10px;
padding:15px 20px;
border:none;
background:#19c37d;
color:white;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.input-area button:hover{
background:#15a96b;
}

/* typing dots */
.typing{
display:inline-block;
}

.typing span{
height:8px;
width:8px;
background:white;
border-radius:50%;
display:inline-block;
margin:0 2px;
animation:bounce 1.3s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:translateY(0)}
40%{transform:translateY(-6px)}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>AI Therapist</h2>

<button onclick="newChat()">+ New Chat</button>
<button onclick="loadHistory()">History</button>
<button onclick="window.open('/graph')">Mood Graph</button>
<button onclick="voice()">🎤 Voice</button>
<button onclick="location.href='/logout'">Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="top">
Welcome <b>{{user}}</b>
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Send a message..." onkeypress="enterSend(event)">
<button onclick="send()">Send</button>
</div>

</div>

<script>

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=999999;
}

function typingBubble(){
return `
<div class="msg bot" id="typing">
<span class="typing">
<span></span><span></span><span></span>
</span>
</div>`;
}

function send(){
let msg=document.getElementById("msg").value;
if(!msg) return;

addMessage(msg,"user");
document.getElementById("msg").value="";

document.getElementById("chat").innerHTML+=typingBubble();

fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("typing").remove();
addMessage(data.reply,"bot");
});
}

function enterSend(e){
if(e.key==="Enter") send();
}

function newChat(){
document.getElementById("chat").innerHTML="";
}

function loadHistory(){
fetch("/history")
.then(res=>res.json())
.then(data=>{
newChat();
data.history.forEach(item=>{
addMessage(item[0],"user");
addMessage("Detected emotion: "+item[1],"bot");
});
});
}

function voice(){
const recognition=new webkitSpeechRecognition();
recognition.lang="en-US";

recognition.onresult=function(e){
document.getElementById("msg").value=e.results[0][0].transcript;
send();
}

recognition.start();
}
</script>

</body>
</html>
