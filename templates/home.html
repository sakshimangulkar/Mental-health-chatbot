<!DOCTYPE html>
<html>
<head>
<title>AI Mental Health Chatbot</title>

<style>
body{
margin:0;
font-family:Segoe UI;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#e8eef7,#dfe9f3);
color:#2c3e50;
text-align:center;
}

.card{
background:white;
padding:50px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:380px;
}

h1{
margin-bottom:10px;
font-size:30px;
color:#1f2d3d;
}

p{
margin-bottom:25px;
color:#6b7c93;
}

img{
width:70px;
margin-bottom:15px;
opacity:.9;
}

.btn{
display:inline-block;
margin:10px;
padding:14px 32px;
background:#4a6fa5;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
transition:.3s;
}

.btn:hover{
background:#3c5d8a;
transform:translateY(-2px);
}

.features{
margin-top:30px;
font-size:14px;
color:#5a6c7d;
line-height:1.6;
}

footer{
position:absolute;
bottom:18px;
font-size:13px;
color:#7a8ca5;
}
</style>
</head>
<body>

<div class="card">

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<h1>AI Mental Health Chatbot</h1>
<p>Your safe space to talk 💙</p>

<a href="/login" class="btn">Login</a>
<a href="/signup" class="btn">Signup</a>

<div class="features">
Emotion Detection • Therapist-style Replies • Mood Tracking • Secure Chat
</div>

</div>

<footer>
AI Mental Wellness Assistant
</footer>

</body>
</html>
