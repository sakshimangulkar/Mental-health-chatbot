<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body{
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
text-align:center;
width:300px;
}

input{
display:block;
margin:15px auto;
padding:12px;
width:90%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px;
width:100%;
background:#2196F3;
color:white;
border:none;
border-radius:8px;
}

a{
display:block;
margin-top:15px;
}
</style>
</head>
<body>

<div class="box">
<h2>Create Account</h2>

<form method="post">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Signup</button>
</form>

<a href="/login">Already have account?</a>
</div>

</body>
</html>
